<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ibrahim Ahtsham CV</title>

    <!-- SEO & social preview -->
    <meta name="description" content="Full-Stack Developer · MSP Operations · IT Support & Automation" />
    <meta property="og:title" content="Ibrahim Ahtsham CV" />
    <meta property="og:description" content="Full-Stack Developer · MSP Operations · IT Support & Automation" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ibrahimahtsham.github.io/CV-2026/" />
    <meta property="og:image" content="https://ibrahimahtsham.github.io/CV-2026/images/my%20face%20updated.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="images/my face updated.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/print.css" />
  </head>
  <body>
    <button id="dark-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
    <nav id="role-nav" aria-label="CV role filter"></nav>
    <div class="a4-wrapper">
      <header class="cv-header" id="cv-header"></header>
      <div class="cv-body" id="cv-body"></div>
    </div>

    <!-- Apply dark mode before the module loads to prevent a flash of light mode -->
    <script>
      (function () {
        var saved = localStorage.getItem('cv-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (saved === null && prefersDark)) {
          document.body.classList.add('dark-mode');
          document.getElementById('dark-toggle').textContent = '\u2600\ufe0f';
        }
      })();
    </script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
